          '<p>Danke, '+S.firstname+'! Matthias Hardtke meldet sich pers\xF6nlich innerhalb von 24&nbsp;Stunden mit einem individuellen Angebot bei Ihnen.</p>'+
          '<div class="st-success-detail">'+
            '<div class="st-success-detail-item"><span>Transportart</span><span>'+lbl+'</span></div>'+
            '<div class="st-success-detail-item"><span>Route</span><span>'+S.starthafen+' &rarr; '+S.zielhafen+'</span></div>'+
            '<div class="st-success-detail-item"><span>Zeitraum</span><span>'+S.wann_soll_das_boot_uberfuhrt_werden_+'</span></div>'+
            '<div class="st-success-detail-item"><span>Schiff</span><span>'+(S.was_fur_ein_boot_wollen_sie_uberfuhren_||'&#8211;')+(S.lange?' &middot; '+S.lange+' m':'')+'</span></div>'+
          '</div>'+
          '<button class="st-new-btn" onclick="window._stReset()">Neue Anfrage starten</button>'+
        '</div>'+
      '</div>';
    }
  };

  function opt(key,val,icon,label,sub){
    return '<div class="st-opt'+(S[key]===val?' sel':'')+'" onclick="window._stSel(\''+key+'\',\''+val+'\',this)">'+
      '<span class="st-opt-icon">'+icon+'</span>'+
      '<span class="st-opt-label">'+label+'</span>'+
      '<span class="st-opt-sub">'+sub+'</span>'+
    '</div>';
  }
  function opt2(key,val,label){
    return '<div class="st-opt'+(S[key]===val?' sel':'')+'" style="padding:15px 12px" onclick="window._stSel(\''+key+'\',\''+val+'\',this)">'+
      '<span class="st-opt-label" style="font-size:13px">'+label+'</span>'+
    '</div>';
  }
  function field(lbl,key,type,ph){
    return '<div class="st-field">'+
      '<label>'+lbl+'</label>'+
      '<input class="st-input" type="'+type+'" placeholder="'+ph+'" value="'+(S[key]||'')+'" '+
        'oninput="window._stSet(\''+key+'\',this.value)">'+
    '</div>';
  }
  function nav(back,nextDis){
    return '<div class="st-nav">'+
      (back?'<button class="st-btn-back" onclick="window._stPrev()">\u2190 Zur\xFCck</button>':'')+
      '<button class="st-btn-next" onclick="window._stNext()" '+(nextDis?'disabled':'')+'>'+
        (cur===5?'Angebot anfordern \u2192':'Weiter \u2192')+
      '</button>'+
    '</div>';
  }

  function render(){ prog(); document.getElementById('stContent').innerHTML=renders[cur](); }

  window._stSel=function(key,val,el){
    S[key]=val;
    var g=el.closest('.st-options');
    if(g) g.querySelectorAll('.st-opt').forEach(function(b){b.classList.remove('sel');});
    el.classList.add('sel');
    var btn=document.querySelector('.st-btn-next');
    if(btn) btn.disabled=false;
  };
  window._stSet=function(key,val){
    S[key]=val;
    var btn=document.querySelector('.st-btn-next');
    if(!btn) return;
    if(key==='starthafen'||key==='zielhafen') btn.disabled=!S.starthafen||!S.zielhafen;
    if(key==='wann_soll_das_boot_uberfuhrt_werden_') btn.disabled=!val;
    if(key==='firstname'||key==='lastname'||key==='email') btn.disabled=!S.firstname||!S.lastname||!S.email;
  };
  window._stToggle=function(id,el){
    var i=S.extras.indexOf(id);
    if(i>-1) S.extras.splice(i,1); else S.extras.push(id);
    el.classList.toggle('checked');
    el.querySelector('.st-check-box').innerHTML=el.classList.contains('checked')?'&#x2713;':'';
  };
  window._stNext=function(){
    if(cur===5){ submitForm(); return; }
    cur=Math.min(cur+1,steps.length-1);
    render();
    document.getElementById('st-form-root').scrollIntoView({behavior:'smooth',block:'start'});
  };
  window._stPrev=function(){ cur=Math.max(cur-1,0); render(); };
  window._stReset=function(){ cur=0; S.transportart=null; S.firstname=''; S.lastname=''; S.email=''; S.starthafen=''; S.zielhafen=''; render(); };

  function submitForm(){
    document.getElementById('stContent').innerHTML='<div class="st-loading"><div class="st-spinner"></div>Anfrage wird gesendet ...</div>';
    function trySubmit(n){
      var f=document.querySelector('#st-hs-container form');
      if(!f && n>0){ setTimeout(function(){ trySubmit(n-1); },400); return; }
      if(!f){
        window.location.href='mailto:info@seatribe-deliveries.com?subject=Anfrage '+S.transportart+'&body='+encodeURIComponent(JSON.stringify(S,null,2));
        cur=6; render(); return;
      }
      var map={
        starthafen:S.starthafen, zielhafen:S.zielhafen,
        wie_soll_das_boot_uberfuhrt_werden_:S.transportart,
        was_fur_ein_boot_wollen_sie_uberfuhren_:S.was_fur_ein_boot_wollen_sie_uberfuhren_,
        bootstyp:S.bootstyp, baujahr:S.baujahr, lange:S.lange,
        mastlange:S.mastlange, breite:S.breite, tiefgang:S.tiefgang,
        wann_soll_das_boot_uberfuhrt_werden_:S.wann_soll_das_boot_uberfuhrt_werden_,
        firstname:S.firstname, lastname:S.lastname, email:S.email,
        phone:S.phone, address:S.address, zip:S.zip, city:S.city, country:S.country,
        message:S.message+(S.extras.length?'\n\nZusatzleistungen: '+S.extras.join(', '):'')
      };
      Object.keys(map).forEach(function(name){
        var el=f.querySelector('[name="'+name+'"]');
        if(el&&map[name]){
          el.value=map[name];
          el.dispatchEvent(new Event('input',{bubbles:true}));
          el.dispatchEvent(new Event('change',{bubbles:true}));
        }
      });
      var gdpr=f.querySelector('[type="checkbox"]');
      if(gdpr){ gdpr.checked=true; gdpr.dispatchEvent(new Event('change',{bubbles:true})); }
      var sub=f.querySelector('[type="submit"]');
      if(sub) sub.click();
      setTimeout(function(){ cur=6; render(); },800);
    }
    trySubmit(10);
  }

  render();
})();
</script>
